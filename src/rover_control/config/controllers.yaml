controller_manager:
  ros__parameters:
    update_rate: 100  # Hz
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

joint_state_broadcaster:
  ros__parameters:
    use_sim_time: true

diff_drive_controller:
  ros__parameters:
    use_sim_time: true

    left_wheel_names:  ["front_left_wheel_joint",  "rear_left_wheel_joint"]
    right_wheel_names: ["front_right_wheel_joint", "rear_right_wheel_joint"]

    wheel_separation: 0.19   # 2 * wheel_offset_y
    wheel_radius: 0.0325     # URDF ile aynı

    # Skid-steer kayma kompensasyonu
    # 4 motor da çekerken efektif teker mesafesi artıyor, multiplier ile kompanse ediyoruz
    wheel_separation_multiplier: 1.5
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_link

    pose_covariance_diagonal:  [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    open_loop: false
    enable_odom_tf: true

    cmd_vel_timeout: 0.5
    publish_limited_velocity: true
    velocity_rolling_window_size: 10

    linear:
      x:
        max_velocity: 1.0
        min_velocity: -1.0
        max_acceleration: 1.0
        max_deceleration: -1.0

    angular:
      z:
        max_velocity: 2.0
        min_velocity: -2.0
        max_acceleration: 2.0
        max_deceleration: -2.0