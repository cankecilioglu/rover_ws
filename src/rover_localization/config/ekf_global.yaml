ekf_filter_node_global:
  ros__parameters:
    use_sim_time: true

    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true
    print_diagnostics: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: map # Bu EKF map frame'de çalışıyor

    # ===== Wheel odometry =====
    odom0: /diff_drive_controller/odom
    odom0_config:
      [
        false,
        false,
        false,
        false,
        false,
        false,
        true,
        false,
        false,
        false,
        false,
        true,
        false,
        false,
        false,
      ]
    odom0_queue_size: 10
    odom0_differential: false

    # ===== IMU =====
    imu0: /imu
    imu0_config:
      [
        false,
        false,
        false,
        false,
        false,
        false,
        false,
        false,
        false,
        false,
        false,
        true,
        true,
        false,
        false,
      ]
    imu0_remove_gravitational_acceleration: true

    # ===== GPS (navsat_transform output) =====
    odom1: /odometry/gps
    odom1_config: [
        true,
        true,
        false, # X, Y position only
        false,
        false,
        false,
        false,
        false,
        false,
        false,
        false,
        false,
        false,
        false,
        false,
      ]
    odom1_queue_size: 10
    odom1_differential: false
