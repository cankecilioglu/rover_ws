ekf_filter_node_local:
  ros__parameters:
    use_sim_time: true

    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true # Skid-steer zemin üstünde, 2D yeter
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    debug: false
    publish_tf: true
    publish_acceleration: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom # Bu EKF odom frame'de çalışıyor

    # ===== Wheel odometry =====
    odom0: /diff_drive_controller/odom
    # [x, y, z,  roll, pitch, yaw,  vx, vy, vz,  vroll, vpitch, vyaw,  ax, ay, az]
    odom0_config:
      [
        false,
        false,
        false,
        false,
        false,
        false,
        true,
        false,
        false,
        false,
        false,
        true,
        false,
        false,
        false,
      ]
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false
    odom0_pose_rejection_threshold: 5.0
    odom0_twist_rejection_threshold: 1.0

    # ===== IMU =====
    imu0: /imu
    imu0_config:
      [
        false,
        false,
        false,
        false,
        false,
        false,
        false,
        false,
        false,
        false,
        false,
        true,
        true,
        false,
        false,
      ]
    imu0_queue_size: 10
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true

    # ===== Process noise covariance (Q matrix) =====
    # Default değerlerle başlıyoruz, ileride tune ederiz
    process_noise_covariance:
